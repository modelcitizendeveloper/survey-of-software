baseURL = 'https://research.modelcitizendeveloper.com/'
languageCode = 'en-us'
title = 'Survey of Software - Research Library'
theme = 'hugo-book'
copyright = '© 2026 Ivan Schneider · <a href="https://modelcitizendeveloper.com/">Model Citizen Developer</a> · Licensed under <a href="/license/">CC BY 4.0</a>'

# Book theme specific config
[params]
  # Show page navigation and menu
  BookShowPageHeader = true
  BookMenuHeader = true
  BookMenu = true
  BookToC = 3

  # Specify section of content to render as menu
  BookSection = 'survey'

  # Enable search
  BookSearch = true

# Disable taxonomy (not needed for documentation)
disableKinds = ['taxonomy', 'taxonomyTerm']

# Enable HTML in Markdown (for details/summary tabs)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.after]]
    name = "What is this?"
    url = "/survey/taxonomy-1.3xx-vision"
    weight = 1

  [[menu.after]]
    name = "The Vision"
    url = "/vision/"
    weight = 2

  [[menu.after]]
    name = "Method"
    url = "/survey/method"
    weight = 3

  [[menu.after]]
    name = "GitHub"
    url = "https://github.com/modelcitizendeveloper/survey-of-software"
    weight = 10

# ── SEO: noindex the generated survey leaves, keep the trunk indexable ──
# Google declined to index ~145 of the long generated survey pages (scaled-content
# judgment). Strategy: noindex every /survey/<leaf>, keep the trunk (home, vision,
# about, skill, license, the /survey/ index, method, taxonomy) in the index.
# method.md and taxonomy-1.3xx-vision.md override this with `noindex: false`.
[[cascade]]
  [cascade.params]
    noindex = true
  [cascade._target]
    path = '/survey/**'
    kind = 'page'
